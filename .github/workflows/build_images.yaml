name: Build and Publish Standard Docker Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: |
          echo "IMAGE_REPOSITORY=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./dao
          file: ./dao/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}:latest
          # This fills in the blank variable the Dockerfile is complaining about!
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:latest
